syntax = "proto3";

package lattice.v1;

option go_package = "github.com/LatticeNet/lattice-sdk/gen/lattice/v1;latticev1";

import "lattice/v1/common.proto";

service AgentService {
  rpc Hello(AgentHelloRequest) returns (AgentAck);
  rpc ReportMetrics(ReportMetricsRequest) returns (AgentAck);
  rpc LeaseTasks(LeaseTasksRequest) returns (LeaseTasksResponse);
  rpc ReportTaskResult(ReportTaskResultRequest) returns (AgentAck);
  rpc ListMonitors(ListMonitorsRequest) returns (ListMonitorsResponse);
  rpc ReportMonitorResult(ReportMonitorResultRequest) returns (AgentAck);
  rpc ReportEvent(ReportAgentEventRequest) returns (AgentAck);
}

message AgentEnvelope {
  string node_id = 1;
  string agent_version = 2;
  string request_id = 3;
  TimePoint sent_at = 4;
}

message AgentAck {
  bool ok = 1;
  string message = 2;
}

message AgentNetworkReport {
  string public_ip = 1;
  string public_ipv6 = 2;
  string wireguard_ip = 3;
  string wireguard_public_key = 4;
  string wireguard_endpoint = 5;
  uint32 wireguard_port = 6;
}

message AgentHelloRequest {
  AgentEnvelope envelope = 1;
  AgentNetworkReport network = 2;
}

message ReportMetricsRequest {
  AgentEnvelope envelope = 1;
  Metrics metrics = 2;
  AgentNetworkReport network = 3;
}

message LeaseTasksRequest {
  AgentEnvelope envelope = 1;
  uint32 limit = 2;
}

message LeasedTask {
  string id = 1;
  string lease_id = 2;
  string interpreter = 3;
  string script = 4;
  uint32 timeout_seconds = 5;
  uint32 output_limit_bytes = 6;
}

message LeaseTasksResponse {
  repeated LeasedTask tasks = 1;
}

message ReportTaskResultRequest {
  AgentEnvelope envelope = 1;
  string lease_id = 2;
  string task_id = 3;
  int32 exit_code = 4;
  // Each text field must be within the leased task output_limit_bytes.
  string stdout = 5;
  string stderr = 6;
  string error = 7;
  TimePoint started_at = 8;
  TimePoint finished_at = 9;
}

message MonitorSpec {
  string id = 1;
  string name = 2;
  string type = 3;
  string target = 4;
  uint32 interval_seconds = 5;
  uint32 timeout_seconds = 6;
}

message ListMonitorsRequest {
  AgentEnvelope envelope = 1;
}

message ListMonitorsResponse {
  repeated MonitorSpec monitors = 1;
}

message ReportMonitorResultRequest {
  AgentEnvelope envelope = 1;
  string monitor_id = 2;
  bool success = 3;
  double latency_ms = 4;
  string error = 5;
}

message ReportAgentEventRequest {
  AgentEnvelope envelope = 1;
  string kind = 2;
  map<string, string> fields = 3;
}
