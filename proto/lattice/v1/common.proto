syntax = "proto3";

package lattice.v1;

option go_package = "github.com/LatticeNet/lattice-sdk/gen/lattice/v1;latticev1";

message TimePoint {
  string unix_nano = 1;
  string rfc3339 = 2;
}

message Metrics {
  double cpu_percent = 1;
  double load1 = 2;
  uint64 memory_used = 3;
  uint64 memory_total = 4;
  uint64 disk_used = 5;
  uint64 disk_total = 6;
  uint64 net_rx_bytes = 7;
  uint64 net_tx_bytes = 8;
  uint64 uptime_seconds = 9;
  TimePoint collected_at = 10;
  double load5 = 11;
  double load15 = 12;
  double net_rx_speed = 13;
  double net_tx_speed = 14;
}

message HostFacts {
  string hostname = 1;
  string os = 2;
  string platform = 3;
  string platform_version = 4;
  string kernel_version = 5;
  string arch = 6;
  uint32 cpu_cores = 7;
  string cpu_model = 8;
  uint64 memory_total = 9;
  uint64 swap_total = 10;
  string virtualization = 11;
  TimePoint boot_time = 12;
  TimePoint reported_at = 13;
}

message NodeGeo {
  string country = 1;
  string city = 2;
  double lat = 3;
  double lon = 4;
  uint32 asn = 5;
  string as_org = 6;
  string provider = 7;
  TimePoint updated_at = 8;
}

message AgentDebugPolicy {
  bool enabled = 1;
  bool collect = 2;
  TimePoint updated_at = 3;
}

message NodeIPConfigView {
  string mode = 1;
  string static_ipv4 = 2;
  string static_ipv6 = 3;
  repeated string resolvers = 4;
  string script_sha256 = 5;
  TimePoint updated_at = 6;
}

message NodeView {
  string id = 1;
  string name = 2;
  repeated string tags = 3;
  string role = 4;
  string wireguard_ip = 5;
  string wireguard_public_key = 6;
  string wireguard_endpoint = 7;
  uint32 wireguard_port = 8;
  string public_ip = 9;
  string public_ipv6 = 10;
  string agent_version = 11;
  bool online = 12;
  TimePoint last_seen = 13;
  Metrics metrics = 14;
  TimePoint created_at = 15;
  HostFacts host_facts = 16;
  NodeGeo geo = 17;
  string comment = 18;
  string internal_ip = 19;
  string internal_ipv6 = 20;
  bool disabled = 21;
  AgentDebugPolicy agent_debug = 22;
  NodeIPConfigView ip_config = 23;
  repeated string group_ids = 24;
  TimePoint token_last_used_at = 25;
}

message MachineView {
  string id = 1;
  string node_id = 2;
  string node_name = 3;
  string label = 4;
  bool online = 5;
  HostFacts host_facts = 6;
  string vendor = 7;
  string region = 8;
  bool has_console_url = 9;
  bool has_detail_url = 10;
  string notes = 11;
  int64 price_cents = 12;
  string currency = 13;
  string renewal_cycle = 14;
  uint32 cycle_days = 15;
  TimePoint next_renewal = 16;
  int32 days_until_renewal = 17;
  bool auto_roll = 18;
  repeated int32 remind_days_before = 19;
  bool reminders_enabled = 20;
  TimePoint updated_at = 21;
}

message NFTInputsView {
  string id = 1;
  string node_id = 2;
  string node_name = 3;
  string interface_name = 4;
  string wireguard_cidr = 5;
  repeated int32 public_tcp = 6;
  repeated int32 public_udp = 7;
  repeated int32 wireguard_tcp = 8;
  repeated int32 wireguard_udp = 9;
  TimePoint updated_at = 10;
}

message DNSRecord {
  string name = 1;
  string type = 2;
  string value = 3;
  uint32 ttl = 4;
}

message DNSZone {
  string suffix = 1;
  string mode = 2;
  repeated string upstreams = 3;
  repeated DNSRecord records = 4;
}

message DNSDeploymentView {
  string id = 1;
  string name = 2;
  string node_id = 3;
  string node_name = 4;
  string engine = 5;
  uint32 listen_port = 6;
  bool enable_udp = 7;
  bool enable_tcp = 8;
  string exposure = 9;
  repeated DNSZone zones = 10;
  string hostname = 11;
  bool publish_ipv4 = 12;
  bool publish_ipv6 = 13;
  uint32 record_ttl = 14;
  string ddns_profile_id = 15;
  bool has_credential = 16;
  string status = 17;
  string engine_version = 18;
  string last_ipv4 = 19;
  string last_ipv6 = 20;
  TimePoint last_applied_at = 21;
  string last_error = 22;
  bool disabled = 23;
  TimePoint created_at = 24;
  TimePoint updated_at = 25;
  TimePoint last_published_at = 26;
  string last_publish_error = 27;
}

message NetEndpoint {
  string kind = 1;
  string node_id = 2;
  string cidr = 3;
  string domain = 4;
}

message NetRule {
  string id = 1;
  string comment = 2;
  string action = 3;
  string direction = 4;
  string protocol = 5;
  repeated int32 ports = 6;
  NetEndpoint remote = 7;
  bool disabled = 8;
}

message NetPolicyView {
  string id = 1;
  string target_node_id = 2;
  string target_node_name = 3;
  repeated NetRule rules = 4;
  bool enabled = 5;
  string last_plan_sha = 6;
  TimePoint last_applied_at = 7;
  string last_error = 8;
  TimePoint updated_at = 9;
}

message NetPolicyGraph {
  message Node {
    string id = 1;
    string name = 2;
    bool online = 3;
    NodeGeo geo = 4;
  }
  message Edge {
    string from = 1;
    string to = 2;
    string action = 3;
    string protocol = 4;
    repeated int32 ports = 5;
    string direction = 6;
    string rule_id = 7;
  }
  message External {
    string target_node_id = 1;
    string action = 2;
    string remote = 3;
    string protocol = 4;
    repeated int32 ports = 5;
    string direction = 6;
    string rule_id = 7;
  }
  repeated Node nodes = 1;
  repeated Edge edges = 2;
  repeated External externals = 3;
}

message ProxyInboundView {
  string id = 1;
  string name = 2;
  string core = 3;
  string protocol = 4;
  string listen = 5;
  uint32 port = 6;
  string transport = 7;
  string path = 8;
  string host = 9;
  string security = 10;
  string sni = 11;
  repeated string alpn = 12;
  string fingerprint = 13;
  string cert_path = 14;
  string key_path = 15;
  bool has_reality_private_key = 16;
  string reality_public_key = 17;
  repeated string reality_short_ids = 18;
  string reality_dest = 19;
  string ss_method = 20;
  bool enabled = 21;
  TimePoint created_at = 22;
  TimePoint updated_at = 23;
}

message ProxyUserView {
  string id = 1;
  string name = 2;
  bool enabled = 3;
  bool has_uuid = 4;
  bool has_password = 5;
  bool has_sub_token = 6;
  repeated string inbound_ids = 7;
  int64 traffic_limit_bytes = 8;
  TimePoint expires_at = 9;
  int64 used_bytes = 10;
  TimePoint last_seen_at = 11;
  string status = 12;
  TimePoint created_at = 13;
  TimePoint updated_at = 14;
}

message ProxyNodeProfileView {
  string id = 1;
  string node_id = 2;
  string node_name = 3;
  string core = 4;
  repeated string inbound_ids = 5;
  string hostname = 6;
  string listen_ip = 7;
  string config_path = 8;
  string stats_api = 9;
  string applied_sha256 = 10;
  TimePoint last_apply_at = 11;
  string last_error = 12;
  TimePoint created_at = 13;
  TimePoint updated_at = 14;
}

message ProxyUsageSnapshot {
  string node_id = 1;
  TimePoint at = 2;
  uint64 core_uptime_sec = 3;
  map<string, int64> user_bytes = 4;
}

message ScopeSet {
  repeated string scopes = 1;
  repeated string server_allowlist = 2;
}

message PageRequest {
  uint32 page_size = 1;
  string page_token = 2;
}

message PageResponse {
  string next_page_token = 1;
}

message AuditEvent {
  string id = 1;
  TimePoint at = 2;
  string actor_id = 3;
  string token_id = 4;
  string node_id = 5;
  string action = 6;
  string scope = 7;
  string decision = 8;
  string reason = 9;
  string correlation_id = 10;
  map<string, string> metadata = 11;
}

message ApiError {
  // Stable machine code. Known values include capability_denied,
  // invalid_node_token, invalid_task_lease, and task_output_limit_exceeded.
  string code = 1;
  // Public, user-facing message. Server-side 5xx details must be redacted.
  string message = 2;
  string request_id = 3;
}
